<div id="loginPage" class="scrollable-content page">
    <div class="back-nav" onclick="goTo('homePage')">← Back</div>

    <div class="logo-container" style="margin-top: 20px;">
        <img src="https://cdn-icons-png.flaticon.com/512/3233/3233215.png" style="width: 60px;" class="brain-img">
        <div class="badge">🛡️ NeuroCare AI</div>
    </div>

    <h1 id="formTitle" style="margin-top: 20px;">Welcome Back</h1>
    <p class="desc" id="formDesc">Sign in to continue</p>

    <!-- ✅ FORM ADDED -->
    <form method="POST" id="authForm">
        {% csrf_token %}

        <!-- SIGNUP FIELDS -->
        <div id="signupFields" style="display:none;">

            <div class="input-wrap">
                <span class="input-icon">👤</span>
                <input type="text" name="username" placeholder="Username">
            </div>

            <div class="input-wrap">
                <span class="input-icon">🧑</span>
                <input type="text" name="name" placeholder="Full Name">
            </div>

            <div class="input-wrap">
                <span class="input-icon">⚧️</span>
                <select name="gender" style="width:100%; padding:16px; border-radius:16px;">
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="input-wrap">
                <span class="input-icon">🎂</span>
                <input type="number" name="age" placeholder="Age">
            </div>

        </div>

        <!-- COMMON FIELDS -->
        <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" name="email" placeholder="Email address">
        </div>

        <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" name="password" placeholder="Password">
        </div>

        <button type="submit" class="btn btn-main" id="submitBtn">
            Sign In
        </button>
    </form>

    <!-- TOGGLE -->
    <div style="text-align: center; margin-top: 20px;">
        <span id="toggleText">Don't have an account?</span>
        <a href="#" onclick="toggleForm()" style="color: var(--dark-teal); font-weight: 600;" id="toggleBtn">
            Sign Up
        </a>
    </div>
</div>
