<h1>Home Page</h1>

{% if user.is_authenticated %}
    <h3>Welcome {{ user.profile.name }}</h3>
    <p>Gender: {{ user.profile.gender }}</p>
    <p>Age: {{ user.profile.age }}</p>

    <a href="{% url 'logout' %}">Logout</a>
{% else %}
    <a href="{% url 'login' %}">Login</a>
    <a href="{% url 'signup' %}">Signup</a>
{% endif %}
